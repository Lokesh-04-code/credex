name: CI — AI Spend Audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Job 1: Server tests ──────────────────────────────────────────────────
  server-tests:
    name: Server — Lint + Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./server

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install server dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run audit engine tests
        run: npm test
        env:
          NODE_ENV: test

  # ── Job 2: Client build check ────────────────────────────────────────────
  # Note: Vite build validates all imports and JSX syntax errors.
  # Full ESLint integration is tracked in: feat(client): add eslint config
  client-build:
    name: Client — Build Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./client

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install client dependencies
        run: npm ci

      - name: Build client (validates no compile errors or dead imports)
        run: npm run build
        env:
          VITE_API_URL: https://credex-api.onrender.com
